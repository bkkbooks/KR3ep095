front:
  text: 序先君子門診日以百計手診者二三十人其除分給門徒診畢一五覆之不稍懈蓋恐失之毫釐也此卷吳君所診先君子為之點竄者居多故論病則劈肌分理剖析毫釐而語氣之間時寓諄諄欣訓誨之意引人入勝且見苦心獨慨先君子門下士百數人當日分診之下改易不少而諸公不能如吳君之用心各編一册匯成大觀惜哉時成豐九年蒲月中旬文瀾識
  hash: sha256:2030c08555c7d4106344a09b2f144c1abd86aed18460d3638ff4a6100c80001b
